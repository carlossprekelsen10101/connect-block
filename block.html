<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block Blast</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  text-align: center;
  overflow: hidden;
}

#menu {
  position: absolute;
  top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  background: rgba(0,0,0,0.7);
}

#menu h1 {
  font-size: 60px;
  color:#38bdf8;
  margin-bottom: 30px;
}

#menu button {
  padding: 20px 40px;
  font-size: 30px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background:#22c55e;
  color:black;
  font-weight:bold;
  transition:0.2s;
}

#menu button:hover { transform: scale(1.1); }

#scoreBoard {
  position:absolute; top:10px; left:10px; font-size:24px; background:#0f172a; padding:10px 15px; border-radius:10px; border:2px solid #38bdf8;
}

#gameCanvas {
  display:block;
  background:#1e293b;
  margin:0 auto;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Block Blast</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="scoreBoard">Score: 0</div>
<canvas id="gameCanvas" width="500" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let shapes = [];
let score = 0;
let gameActive = false;
let shapeTypes = [
  {color:'#ef4444', size:50},
  {color:'#f59e0b', size:50},
  {color:'#22c55e', size:50},
  {color:'#3b82f6', size:50},
  {color:'#8b5cf6', size:50},
  {color:'#ec4899', size:50},
  {color:'#14b8a6', size:50},
  {color:'#eab308', size:50},
  {color:'#f43f5e', size:50},
  {color:'#10b981', size:50}
];

function startGame(){
  document.getElementById("menu").style.display="none";
  shapes=[];
  score=0;
  gameActive=true;
  spawnShape();
  requestAnimationFrame(gameLoop);
  updateScore();
}

function spawnShape(){
  if(!gameActive) return;
  const type = shapeTypes[Math.floor(Math.random()*shapeTypes.length)];
  const x = Math.random()*(canvas.width-type.size);
  shapes.push({x:x, y:0, size:type.size, color:type.color, speed: Math.random()*2 + 1});
  setTimeout(spawnShape, 800); // new shape every 0.8s
}

canvas.addEventListener("click", function(e){
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for(let i=shapes.length-1; i>=0; i--){
    const s = shapes[i];
    if(mx > s.x && mx < s.x+s.size && my > s.y && my < s.y+s.size){
      shapes.splice(i,1);
      score+=10;
      updateScore();
      break;
    }
  }
});

function updateScore(){
  document.getElementById("scoreBoard").innerText = "Score: "+score;
}

function gameLoop(){
  if(!gameActive) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=shapes.length-1;i>=0;i--){
    const s=shapes[i];
    s.y+=s.speed;
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x,s.y,s.size,s.size);

    if(s.y+s.size>=canvas.height){
      gameActive=false;
      alert("Game Over! Score: "+score);
      document.getElementById("menu").style.display="flex";
      return;
    }
  }

  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
