<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Tetris</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin:0;
  font-family: 'Press Start 2P', cursive;
  background:black;
  text-align:center;
  overflow:hidden;
}

#menu {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  background: rgba(0,0,0,0.9);
}

#menu h1 {
  font-size:48px;
  color:#38bdf8;
  margin-bottom:30px;
  text-shadow: 2px 2px #ff00ff;
}

#menu button {
  padding:20px 40px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#0d6efd;
  color:white;
  font-family: 'Press Start 2P', cursive;
  transition:0.2s;
}

#menu button:hover { transform: scale(1.1); }

#scoreBoard {
  position:absolute; top:10px; left:10px; font-size:14px; color:white;
  font-family:'Press Start 2P', cursive;
}

canvas {
  display:block;
  margin: 50px auto;
  border: 4px solid #38bdf8;
  background:black;
}
</style>
</head>
<body>

<canvas id="menuCanvas" width="300" height="600"></canvas>

<div id="menu">
  <h1>PIXEL TETRIS</h1>
  <button onclick="startGame()">PLAY</button>
</div>

<div id="scoreBoard">Score: 0 | High Score: 0</div>
<canvas id="gameCanvas" width="300" height="480"></canvas>

<script>
const menuCanvas=document.getElementById("menuCanvas");
const menuCtx=menuCanvas.getContext("2d");

function drawStarfield(ctx,width,height,numStars){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,width,height);
  for(let i=0;i<numStars;i++){
    ctx.fillStyle="white";
    let x=Math.floor(Math.random()*width);
    let y=Math.floor(Math.random()*height);
    ctx.fillRect(x,y,2,2);
  }
}
drawStarfield(menuCtx,300,600,100);

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const ROWS = 16; // shorter
const COLS = 10;
const BLOCK_SIZE = 30;
let grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));

let score = 0;
let highScore = localStorage.getItem("pixelTetrisHighScore") || 0;
document.getElementById("scoreBoard").innerText = `Score: ${score} | High Score: ${highScore}`;

let shapes = [
  [[1,1,1,1]], // I
  [[2,2],[2,2]], // O
  [[0,3,0],[3,3,3]], // T
  [[0,4,4],[4,4,0]], // S
  [[5,5,0],[0,5,5]], // Z
  [[6,0,0],[6,6,6]], // J
  [[0,0,7],[7,7,7]]  // L
];

let colors = ["","#00ffff","#ffff00","#ff00ff","#00ff00","#ff0000","#0000ff","#ff8000"];

let textures = [];

for(let c=1;c<colors.length;c++){
  let t=document.createElement("canvas");
  t.width=t.height=BLOCK_SIZE;
  let tc=t.getContext("2d");
  tc.fillStyle=colors[c];
  tc.fillRect(0,0,BLOCK_SIZE,BLOCK_SIZE);
  tc.fillStyle="rgba(255,255,255,0.2)";
  for(let i=0;i<5;i++){
    tc.fillRect(Math.floor(Math.random()*BLOCK_SIZE), Math.floor(Math.random()*BLOCK_SIZE),2,2);
  }
  textures[c]=t;
}

let currentShape, currentX, currentY;
let gameInterval;
let dropSpeed = 500;

function randomShape(){
  const s = shapes[Math.floor(Math.random()*shapes.length)];
  return JSON.parse(JSON.stringify(s));
}

function startGame(){
  document.getElementById("menu").style.display="none";
  grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0;
  dropSpeed = 500;
  spawnShape();
  draw();
  gameInterval = setInterval(gameLoop,dropSpeed);
}

function spawnShape(){
  currentShape=randomShape();
  currentX = Math.floor(COLS/2) - Math.floor(currentShape[0].length/2);
  currentY = 0;
}

function draw(){
  // draw pixel stars background
  drawStarfield(ctx,canvas.width,canvas.height,50);

  // draw grid
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]!==0){
        ctx.drawImage(textures[grid[r][c]], c*BLOCK_SIZE, r*BLOCK_SIZE);
        ctx.strokeStyle="#000";
        ctx.strokeRect(c*BLOCK_SIZE, r*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }

  // draw current shape
  for(let r=0;r<currentShape.length;r++){
    for(let c=0;c<currentShape[r].length;c++){
      if(currentShape[r][c]!==0){
        ctx.drawImage(textures[currentShape[r][c]], (currentX+c)*BLOCK_SIZE, (currentY+r)*BLOCK_SIZE);
        ctx.strokeStyle="#000";
        ctx.strokeRect((currentX+c)*BLOCK_SIZE, (currentY+r)*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }
  document.getElementById("scoreBoard").innerText = `Score: ${score} | High Score: ${highScore}`;
}

function collide(){
  for(let r=0;r<currentShape.length;r++){
    for(let c=0;c<currentShape[r].length;c++){
      if(currentShape[r][c]!==0){
        let x=currentX+c;
        let y=currentY+r;
        if(y>=ROWS || x<0 || x>=COLS || grid[y][x]!==0) return true;
      }
    }
  }
  return false;
}

function merge(){
  for(let r=0;r<currentShape.length;r++){
    for(let c=0;c<currentShape[r].length;c++){
      if(currentShape[r][c]!==0){
        grid[currentY+r][currentX+c] = currentShape[r][c];
      }
    }
  }
}

function rotate(shape){
  const N=shape.length;
  let newShape = Array.from({length:N},()=>Array(N).fill(0));
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      newShape[c][N-1-r]=shape[r][c];
    }
  }
  return newShape;
}

function clearLines(){
  let lines = 0;
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c!==0)){
      grid.splice(r,1);
      grid.unshift(Array(COLS).fill(0));
      lines++;
      r++;
    }
  }
  score += lines*100;
  if(score>highScore){highScore=score; localStorage.setItem("pixelTetrisHighScore",highScore);}
}

function gameLoop(){
  currentY++;
  if(collide()){
    currentY--;
    merge();
    clearLines();
    spawnShape();
    if(collide()){
      clearInterval(gameInterval);
      alert("Game Over! Score: "+score);
      document.getElementById("menu").style.display="flex";
    }
  }
  draw();
}

// controls
document.addEventListener("keydown",e=>{
  if(!currentShape) return;
  if(e.key==="ArrowLeft"){ currentX--; if(collide()) currentX++; }
  else if(e.key==="ArrowRight"){ currentX++; if(collide()) currentX--; }
  else if(e.key==="ArrowDown"){ currentY++; if(collide()) currentY--; }
  else if(e.key==="ArrowUp"){ // rotate clockwise
    let rotated = rotate(currentShape);
    let temp=currentShape;
    currentShape=rotated;
    if(collide()) currentShape=temp;
  }
  draw();
});

</script>
</body>
</html>
